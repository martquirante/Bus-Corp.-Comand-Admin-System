<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POS Bus Admin System</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background: #eef4f8;
        color: #142033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(15, 122, 211, 0.08) 1px, transparent 1px),
          linear-gradient(0deg, rgba(19, 164, 107, 0.06) 1px, transparent 1px),
          #eef4f8;
        background-size: 34px 34px;
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid rgba(20, 32, 51, 0.12);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 70px rgba(28, 48, 76, 0.16);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0 0 18px;
        color: #66758a;
        line-height: 1.6;
      }

      code {
        display: block;
        margin: 14px 0;
        padding: 14px;
        border-radius: 8px;
        color: #edf4fb;
        background: #142033;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, #0f7ad3, #13a46b);
        text-decoration: none;
        font-weight: 700;
      }

      small {
        display: block;
        margin-top: 18px;
        color: #66758a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>POS Bus Admin is now a full-stack app</h1>
      <p>
        The old static dashboard was moved to <strong>legacy/web-admin</strong>.
        The active frontend is <strong>frontend</strong> and the backend is
        <strong>backend</strong>.
      </p>
      <p>Run the new system from the project root:</p>
      <code>npm run dev</code>
      <a href="http://localhost:3000">Open new admin web</a>
      <small>API health check: http://localhost:4000/api/health</small>
    </main>
  </body>
</html>
